###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Core binds
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# ==========================================
# WINDOW MANAGEMENT
# ==========================================

# Toggle Fullscreen (Super + F)
bind = $mainMod, F, fullscreen,

# Toggle Floating (Super + Shift + F)
bind = $mainMod SHIFT, F, togglefloating,

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move active window around the workspace (Super + Shift + Arrows)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize active window (Super + Alt + Arrows)
binde = $mainMod ALT, right, resizeactive, 20 0
binde = $mainMod ALT, left, resizeactive, -20 0
binde = $mainMod ALT, up, resizeactive, 0 -20
binde = $mainMod ALT, down, resizeactive, 0 20

# ==========================================
# WORKSPACES
# ==========================================

# Switch workspaces with mainMod + [0-9]
# bind = $mainMod, 1, workspace, 1
# bind = $mainMod, 2, workspace, 2
# bind = $mainMod, 3, workspace, 3
# bind = $mainMod, 4, workspace, 4
# bind = $mainMod, 5, workspace, 5
# bind = $mainMod, 6, workspace, 6
# bind = $mainMod, 7, workspace, 7
# bind = $mainMod, 8, workspace, 8
# bind = $mainMod, 9, workspace, 9
# bind = $mainMod, 0, workspace, 10

# ==========================================
# WORKSPACES (Independent Monitor Plugin)
# ==========================================

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, split-workspace, 1
bind = $mainMod, 2, split-workspace, 2
bind = $mainMod, 3, split-workspace, 3
bind = $mainMod, 4, split-workspace, 4
bind = $mainMod, 5, split-workspace, 5
bind = $mainMod, 6, split-workspace, 6
bind = $mainMod, 7, split-workspace, 7
bind = $mainMod, 8, split-workspace, 8
bind = $mainMod, 9, split-workspace, 9
bind = $mainMod, 0, split-workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, split-movetoworkspace, 1
bind = $mainMod SHIFT, 2, split-movetoworkspace, 2
bind = $mainMod SHIFT, 3, split-movetoworkspace, 3
bind = $mainMod SHIFT, 4, split-movetoworkspace, 4
bind = $mainMod SHIFT, 5, split-movetoworkspace, 5
bind = $mainMod SHIFT, 6, split-movetoworkspace, 6
bind = $mainMod SHIFT, 7, split-movetoworkspace, 7
bind = $mainMod SHIFT, 8, split-movetoworkspace, 8
bind = $mainMod SHIFT, 9, split-movetoworkspace, 9
bind = $mainMod SHIFT, 0, split-movetoworkspace, 10




# Move active window to a workspace with mainMod + SHIFT + [0-9]
# bind = $mainMod SHIFT, 1, movetoworkspace, 1
# bind = $mainMod SHIFT, 2, movetoworkspace, 2
# bind = $mainMod SHIFT, 3, movetoworkspace, 3
# bind = $mainMod SHIFT, 4, movetoworkspace, 4
# bind = $mainMod SHIFT, 5, movetoworkspace, 5
# bind = $mainMod SHIFT, 6, movetoworkspace, 6
# bind = $mainMod SHIFT, 7, movetoworkspace, 7
# bind = $mainMod SHIFT, 8, movetoworkspace, 8
# bind = $mainMod SHIFT, 9, movetoworkspace, 9
# bind = $mainMod SHIFT, 0, movetoworkspace, 10



# # ==========================================
# # EXTRA WORKSPACES (11 - 20)
# # ==========================================
# # Switch to workspaces 11-20 using Super + Ctrl + [1-0]
# bind = $mainMod CTRL, 1, workspace, 11
# bind = $mainMod CTRL, 2, workspace, 12
# bind = $mainMod CTRL, 3, workspace, 13
# bind = $mainMod CTRL, 4, workspace, 14
# bind = $mainMod CTRL, 5, workspace, 15
# bind = $mainMod CTRL, 6, workspace, 16
# bind = $mainMod CTRL, 7, workspace, 17
# bind = $mainMod CTRL, 8, workspace, 18
# bind = $mainMod CTRL, 9, workspace, 19
# bind = $mainMod CTRL, 0, workspace, 20

# # Move active window to workspaces 11-20 using Super + Ctrl + Shift + [1-0]
# bind = $mainMod CTRL SHIFT, 1, movetoworkspace, 11
# bind = $mainMod CTRL SHIFT, 2, movetoworkspace, 12
# bind = $mainMod CTRL SHIFT, 3, movetoworkspace, 13
# bind = $mainMod CTRL SHIFT, 4, movetoworkspace, 14
# bind = $mainMod CTRL SHIFT, 5, movetoworkspace, 15
# bind = $mainMod CTRL SHIFT, 6, movetoworkspace, 16
# bind = $mainMod CTRL SHIFT, 7, movetoworkspace, 17
# bind = $mainMod CTRL SHIFT, 8, movetoworkspace, 18
# bind = $mainMod CTRL SHIFT, 9, movetoworkspace, 19
# bind = $mainMod CTRL SHIFT, 0, movetoworkspace, 20


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ==========================================
# SPECIAL WORKSPACE
# ==========================================
# Using Super + W to avoid conflicts with Screenshot (Super + Shift + S)
bind = $mainMod, W, togglespecialworkspace, magic
bind = $mainMod SHIFT, W, movetoworkspace, special:magic

# ==========================================
# GROUPING WINDOWS (TABBING)
# ==========================================
bind = $mainMod, G, togglegroup,
# Super + Tab was removed from here to allow Pyprland Expose to use it
bind = $mainMod SHIFT, tab, changegroupactive, b

# ==========================================
# MEDIA & HARDWARE KEYS
# ==========================================
# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ==========================================
# APPLICATION LAUNCHERS & UTILITIES
# ==========================================
# Launch Rofi With SUPER + SPACE
bind = $mainMod, SPACE, exec, $menu

# File Manager (Super + E)
bind = $mainMod, E, exec, $fileManager

# Web Browser (Super + B)
bind = $mainMod, B, exec, google-chrome-stable --enable-features=UseOzonePlatform --ozone-platform=wayland

# Clipboard Manager (Super + V)
bind = $mainMod, V, exec, sh -c 'cliphist list | rofi -dmenu -p "󰅌 Clipboard" | cliphist decode | wl-copy'

# Lock Screen (Super + L)
bind = $mainMod, L, exec, hyprlock


# ==========================================
# HYPRSHOT + SWAPPY SCREENSHOTS
# ==========================================
# 1. Screenshot the entire screen (Print Screen)
bind = , Print, exec, sh -c 'hyprshot -m output --raw | swappy -f -'

# 2. Screenshot a specific window (SUPER + Print Screen)
bind = $mainMod, Print, exec, sh -c 'hyprshot -m window --raw | swappy -f -'

# 3. Screenshot a selected region (SUPER + SHIFT + S)
bind = $mainMod SHIFT, S, exec, sh -c 'hyprshot -m region --raw | swappy -f -'


# ==========================================
# PYPRLAND PLUGINS & SCRATCHPADS
# ==========================================

# Scratchpads
bind = $mainMod, T, exec, pypr toggle term           # Dropdown terminal
bind = $mainMod, U, exec, pypr toggle volume         # Slide-in volume mixer (TUI)
bind = $mainMod, I, exec, pypr toggle wifi           # Slide-in Wi-Fi manager (TUI)
# Expose & Rofi Menus
bind = $mainMod, Tab, exec, pypr expose              # Mission control overview
bind = $mainMod, A, exec, pypr fetch_client_menu     # Rofi window switcher

# Layout Center
bind = $mainMod, Z, exec, pypr layout_center toggle  # Centers active window
bind = $mainMod, bracketleft, exec, pypr layout_center prev  # Navigate center layout left ([ key)
bind = $mainMod, bracketright, exec, pypr layout_center next # Navigate center layout right (] key)

# Multi-Monitor Shifting
bind = $mainMod, N, exec, pypr shift_monitors +1       # Shift workspaces to next monitor
bind = $mainMod SHIFT, N, exec, pypr shift_monitors -1 # Shift workspaces to previous monitor

# Rescue Windows
bind = $mainMod, Backspace, exec, pypr lost_windows  # Rescues off-screen windows


# Keyboard RGB Control Menu (Super + K)
# bind = $mainMod, K, exec, kitty --class floating_kitty arch-sense
bind = $mainMod, K, exec, sh ~/.config/hypr/scripts/rgb_keyboard_selector.sh
# ==========================================
# MULTI-MONITOR CONTROLS
# ==========================================
# Switch focus to the left/right monitor (Super + Comma/Period)
bind = $mainMod, comma, focusmonitor, l
bind = $mainMod, period, focusmonitor, r

bind = $mainMod SHIFT, B, exec, sh ~/.config/hypr/scripts/rofi_wallpaper_selector.sh