# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

### MY PROGRAMS ###
###################
# DEFINE THESE FIRST!
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun -show-icons

# THEN SOURCE YOUR FILES
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/looks.conf
source = ~/.config/hypr/rules.conf # Renamed from window&workspaces.conf for safer parsing
source = ~/.config/hypr/monitors.conf
# source = ~/.config/hypr/workspaces.conf


#################
### AUTOSTART ###
#################
# Autostart necessary processes (like notifications daemons, status bars, etc.)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # Essential for screen sharing
exec-once = gnome-keyring-daemon --start --components=secrets
# exec-once = waybar
# exec-once = hyprpaper
exec-once = pypr
# exec-once = swaync
# exec-once = nm-applet --indicator
exec-once = blueman-applet
# exec-once = systemctl --user start hyprpolkitagent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# Start clipboard manager (text and images)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Play a looping video on all monitors without audio
# exec-once = mpvpaper -o "--loop --no-audio --hwdec=auto --panscan=1.0" ALL /home/fiamanillah/Videos/Hidamari/hunt-showdown-veil-of-thorns.1920x1080.mp4
exec-once = hypridle
# exec-once = wpaperd -d
# Load plugins on startup
exec-once = hyprpm reload -n
exec-once = hyprpanel
exec-once = swww-daemon
exec-once = ~/.config/hypr/scripts/swww-changer.sh


#############################
### ENVIRONMENT VARIABLES ###
#############################
# See https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20

# Core NVIDIA & Wayland Variables
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = HYPRSHOT_DIR,$HOME/Pictures/Screenshots

# Fix for blurry XWayland apps when using fractional scaling (1.2)
xwayland {
    force_zero_scaling = true
}

# Replaces the deprecated WLR_NO_HARDWARE_CURSORS for NVIDIA
cursor {
    no_hardware_cursors = true
}

#############
### INPUT ###
#############
# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 2
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
################
### GESTURES ###
################
# Adjust the feel of the workspace swipe
gestures {
    workspace_swipe_distance = 300 # How far you have to swipe to trigger it
    workspace_swipe_invert = true  # Set to false if swiping left/right feels backwards
}

# Define your specific 3-finger actions (Root level)
gesture = 3, horizontal, workspace
gesture = 3, down, mod: ALT, close
gesture = 3, up, mod: SUPER, scale: 1.5, fullscreen

# Example per-device config
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}



# ==========================================
# PLUGIN CONFIGURATION
# ==========================================
plugin {
    split-monitor-workspaces {
        count = 10
        keep_focused = 0
        enable_notifications = 0
        enable_persistent_workspaces = 0
    }
}