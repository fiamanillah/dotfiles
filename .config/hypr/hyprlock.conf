# background blur and styling
background {
    monitor =
    path = screenshot   # Takes a screenshot of your current desktop
    
    # Increased blur for a smoother frosted glass effect
    blur_passes = 3     
    blur_size = 8
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 90
    font_family = Noto Sans Bold
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(220, 220, 220, 1.0)
    font_size = 22
    font_family = Noto Sans
    position = 0, 40
    halign = center
    valign = center
    shadow_passes = 1
}

# GREETING
label {
    monitor =
    text = Welcome back, Fi
    color = rgba(255, 255, 255, 0.8)
    font_size = 18
    font_family = Noto Sans
    position = 0, -20
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    
    # Styled with an orange accent and semi-transparent dark inner background
    outer_color = rgb(ff9800)
    inner_color = rgba(25, 25, 25, 0.75)
    font_color = rgb(220, 220, 220)
    
    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i> 
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
    
    # Matched to your general window rounding
    rounding = 12
}