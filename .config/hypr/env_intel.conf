# ==========================================
# INTEL SPECIFIC ENVIRONMENT VARIABLES
# ==========================================

# Standard Wayland session
env = XDG_SESSION_TYPE,wayland

# Use Intel's media driver for hardware acceleration (12th gen uses iHD)
env = LIBVA_DRIVER_NAME,iHD 

# Hardware cursors work perfectly fine on Intel, so we explicitly enable them for better performance
cursor {
    no_hardware_cursors = false
}